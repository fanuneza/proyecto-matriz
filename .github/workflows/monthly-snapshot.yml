name: Monthly Snapshot

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  write-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write monthly snapshot
        env:
          CNE_API_EMAIL: ${{ secrets.CNE_API_EMAIL }}
          CNE_API_PASSWORD: ${{ secrets.CNE_API_PASSWORD }}
        run: npm run write-snapshot

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots
          git diff --cached --quiet && echo "No snapshot changes to commit" && exit 0
          git commit -m "chore: add monthly snapshot"
          git push
